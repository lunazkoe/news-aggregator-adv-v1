services:
  postgres:
    image: postgres:16-alpine
    container_name: news-aggregator-adv-v1-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=news_aggregator_db

  mongodb:
    image: mongo:7.0
    container_name: news-aggregator-adv-v1-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=news_aggregator # 초기 생성될 데이터베이스 이름

  kafka:
    image: apache/kafka:3.7.0 # Apache 공식 이미지로 변경
    container_name: news-aggregator-adv-v1-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  redis:
    image: redis:7.2-alpine
    container_name: news-aggregator-adv-v1-redis
    ports:
      - "6379:6379"
