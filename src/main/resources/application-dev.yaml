spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/news_aggregator_db
    username: user
    password: pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  #    show-sql: true
  data:
    mongodb:
      uri: mongodb://localhost/news_aggregator


logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    com.lunazkoe.naa: trace

external-api:
  naver:
    url: https://openapi.naver.com
    client-id: ${NAVER_CLIENT_ID:your_client_id}
    client-secret: ${NAVER_CLIENT_SECRET:your_client_secret}